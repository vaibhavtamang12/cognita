<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Archivum · RAG Chat{% endblock %}</title>

  <!-- HTMX -->
  <script src="/static/js/htmx.min.js" defer></script>

  <!-- Tailwind CSS (CDN) -->
  <link  rel="stylesheet" href="/static/css/tailwind.min.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Playfair Display"', 'Georgia', 'serif'],
            mono:    ['"JetBrains Mono"', '"Fira Code"', 'monospace'],
            body:    ['"DM Sans"', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <!-- <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" /> -->
  <link  rel="stylesheet" href="/static/css/fonts.css" />

  <style>
    /* ── Design tokens ──────────────────────────────────────────────── */
    :root {
      --bg:         #0f0e0c;
      --surface:    #181714;
      --surface-2:  #1f1e1a;
      --border:     #2a2824;
      --accent:     #c9a96e;       /* warm gold */
      --accent-dim: #7a6340;
      --text:       #e8e2d9;
      --text-muted: #7a7468;
      --user-bg:    #1a2535;
      --user-border:#2a3f5f;
      --ai-bg:      #1a1a17;
      --ai-border:  #2a2824;
      --error-bg:   #2a1515;
      --error-border:#5a2020;
      --radius:     0.625rem;
    }

    /* ── Base ───────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Scrollbar ──────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ── Typography ─────────────────────────────────────────────────── */
    h1, h2, h3 {
      font-family: 'Playfair Display', Georgia, serif;
      letter-spacing: -0.02em;
    }

    code, pre {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875em;
    }

    /* ── Subtle grain overlay ───────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Surface cards ──────────────────────────────────────────────── */
    .surface {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .surface-2 {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    /* ── Accent line ────────────────────────────────────────────────── */
    .accent-line {
      width: 2.5rem;
      height: 2px;
      background: var(--accent);
      border-radius: 99px;
    }

    /* ── Buttons ────────────────────────────────────────────────────── */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 1.25rem;
      background: var(--accent);
      color: #0f0e0c;
      font-weight: 500;
      font-size: 0.875rem;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-primary:hover  { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 0.9rem;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.8rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }

    /* ── Form inputs ────────────────────────────────────────────────── */
    .input-field {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      padding: 0.6rem 0.9rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9375rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-field:focus { border-color: var(--accent-dim); }
    .input-field::placeholder { color: var(--text-muted); }

    /* ── HTMX indicators ────────────────────────────────────────────── */
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: flex; }
    .htmx-request.htmx-indicator  { display: flex; }

    /* Pulse dot animation */
    @keyframes pulse-dot {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%           { transform: scale(1);   opacity: 1;   }
    }
    .pulse-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse-dot 1.2s ease-in-out infinite;
    }
    .pulse-dot:nth-child(2) { animation-delay: 0.2s; }
    .pulse-dot:nth-child(3) { animation-delay: 0.4s; }

    /* ── Message bubbles ────────────────────────────────────────────── */
    .msg-enter {
      animation: msg-in 0.25s ease-out both;
    }
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    /* ── Divider ────────────────────────────────────────────────────── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0;
    }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body class="h-full">
  {% block body %}{% endblock %}
</body>
</html>
